# Model and tensor-parallel-size are injected at runtime by handler.py:
#   model              → resolved local snapshot path on the volume
#   tensor-parallel-size → auto-detected GPU count
#
# Set these RunPod env vars to control which model is used:
#   MODEL_NAME=google/gemma-4-31B-it          (dense 31B, 1× 80GB GPU)
#   MODEL_NAME=google/gemma-4-26B-A4B-it      (MoE 26B/4B active, 1× 80GB GPU, faster)
#   HF_HOME=/runpod-volume/huggingface-cache  (where model is cached on the volume)

host: "0.0.0.0"
port: 8001

# Gemma 4 supports up to 131072 tokens natively.
# With gpu_memory_utilization=0.90 on a single GPU the KV cache can support
# at most ~44 192 tokens. 32768 is a safe round number well inside that limit.
# Raise to 40000 if you need longer contexts (still fits within the measured cap).
max-model-len: 32768
gpu-memory-utilization: 0.90

disable-log-stats: false
uvicorn-log-level: info

# Gemma 4 tool calling and reasoning (thinking mode)
enable-auto-tool-choice: true
tool-call-parser: gemma4
reasoning-parser: gemma4

# Throughput tuning
max-num-seqs: 16
max-num-batched-tokens: 8192
enable-chunked-prefill: true

# Text-only mode — skips loading vision/audio encoder components entirely.
# This saves VRAM and speeds up startup. Remove to enable image/audio inputs.
language-model-only: true
